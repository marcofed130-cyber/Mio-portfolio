<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Fotografico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f5f5f5; margin: 0; }
        .photo-card { overflow: hidden; position: relative; border-radius: 8px; background: #1a1a1a; }
        .photo-card img { transition: transform 0.6s ease; width: 100%; height: 100%; object-fit: cover; }
        .photo-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md p-4 flex justify-between">
        <a href="#" class="text-xl font-bold uppercase tracking-widest">Mio<span class="text-gray-500">Portfolio</span></a>
        <div class="space-x-4 text-sm uppercase">
            <a href="#gallery">Galleria</a>
            <a href="#about">Chi Sono</a>
        </div>
    </nav>
    <header class="h-screen flex items-center justify-center text-center bg-zinc-900">
        <div class="px-6">
            <h1 class="text-5xl md:text-7xl mb-4 font-serif">Visione Creativa</h1>
            <p class="text-gray-400 mb-8">Fotografia d'arte e paesaggi.</p>
            <a href="#gallery" class="border border-white px-6 py-2 uppercase text-xs hover:bg-white hover:text-black transition">Esplora</a>
        </div>
    </header>
    <section id="gallery" class="py-20 px-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="photo-card aspect-square"><img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=800"></div>
        <div class="photo-card aspect-square"><img src="https://images.unsplash.com/photo-1449156001935-91391d720504?q=80&w=800"></div>
        <div class="photo-card aspect-square"><img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=800"></div>
    </section>
    <footer class="py-10 text-center border-t border-white/10 text-gray-600 text-xs">
        © 2026 IL MIO PORTFOLIO
    </footer>
</body>
</html>
